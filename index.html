<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sistema Pastoral</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .view { display: none; } .active { display: block; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #334155; border: none; border-radius: 8px; color: white; }
        button { width: 100%; padding: 12px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; color: white; }
        td, th { padding: 8px; border: 1px solid #475569; }
    </style>
</head>
<body>

<div id="login-view" class="view active box">
    <h2>Inicio de Sesión</h2>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button onclick="login()">Ingresar</button>
</div>

<div id="catequista-view" class="view box">
    <h2>Nueva Actividad</h2>
    <input id="nombre" placeholder="Tu Nombre">
    <select id="cat"><option value="Formacion">Formación</option><option value="Social">Social</option></select>
    <input id="actividad" placeholder="Nombre Actividad">
    <input type="date" id="inicio">
    <input type="date" id="fin">
    <textarea id="meta" placeholder="Meta"></textarea>
    <button onclick="enviar()">Enviar Propuesta</button>
</div>

<div id="admin-view" class="view box" style="max-width: 800px;">
    <h2>Panel Admin</h2>
    <button onclick="cargar()">Refrescar Datos</button>
    <table>
        <thead><tr><th>Nombre</th><th>Actividad</th><th>Meta</th><th>Acción</th></tr></thead>
        <tbody id="contenido"></tbody>
    </table>
</div>

<script>
    const API = "https://script.google.com/macros/s/AKfycbwqZmoh3L0VTHOpZUQZsk4ZeYFPaFR_TK2S3_tipPz-pXgUV9QVG88JVBfkno4b1jKQ/exec";

    function login() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'cat2026' && p === 'confir26') show('catequista-view');
        else if(u === 'admin' && p === 'admin123') { show('admin-view'); cargar(); }
        else alert("Credenciales incorrectas");
    }

    function show(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function enviar() {
        const data = { action:'add', nombre:document.getElementById('nombre').value, categoria:document.getElementById('cat').value, actividad:document.getElementById('actividad').value, inicio:document.getElementById('inicio').value, fin:document.getElementById('fin').value, meta:document.getElementById('meta').value };
        try {
            await fetch(API, { method:'POST', body:JSON.stringify(data) });
            alert("Enviado correctamente");
        } catch(e) { alert("Error al enviar: " + e.message); }
    }

    async function cargar() {
        try {
            const res = await fetch(API);
            const data = await res.json();
            document.getElementById('contenido').innerHTML = data.map((f, i) => `<tr><td>${f[1]}</td><td>${f[3]}</td><td>${f[6]}</td><td><button onclick="del(${i})">X</button></td></tr>`).join('');
        } catch(e) { alert("Error al cargar: " + e.message); }
    }
</script>
</body>
</html>
