<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plan Pastoral</title>
    <style>
        body { font-family: sans-serif; background: #0f172a; color: white; display: flex; justify-content: center; padding: 20px; }
        .box { background: #1e293b; padding: 30px; border-radius: 15px; width: 100%; max-width: 500px; }
        input, select, textarea { width: 100%; padding: 12px; margin: 10px 0; background: #334155; border: none; border-radius: 8px; color: white; }
        button { width: 100%; padding: 15px; background: #38bdf8; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div id="catequista-view" class="box">
    <h2>Nueva Propuesta</h2>
    <input id="nombre" placeholder="Nombre">
    <select id="cat"><option>Formación</option><option>Social</option><option>Convivencia</option></select>
    <input id="actividad" placeholder="Actividad">
    <input type="date" id="inicio">
    <input type="date" id="fin">
    <textarea id="meta" placeholder="Meta"></textarea>
    <button onclick="enviar()">Enviar Propuesta</button>
</div>

<script>
    // PEGA AQUÍ TU URL (asegúrate de que sea la de la "Nueva Versión")
    const API = "https://script.google.com/macros/s/AKfycby_I1vwM-JtOkg5Bid3S3Tp7N06zGbIU9U72hr0zZoNsRQdnAw0UbhiJyr8P6hMZgo/exec";

    async function enviar() {
        const data = { 
            action: 'add', 
            nombre: document.getElementById('nombre').value, 
            categoria: document.getElementById('cat').value, 
            actividad: document.getElementById('actividad').value, 
            inicio: document.getElementById('inicio').value, 
            fin: document.getElementById('fin').value, 
            meta: document.getElementById('meta').value 
        };
        
        try {
            const res = await fetch(API, { 
                method: 'POST', 
                body: JSON.stringify(data) 
            });
            alert("Enviado con éxito");
        } catch(e) { 
            alert("Error: " + e.message); 
        }
    }
</script>
</body>
</html>
</body>
</html>
